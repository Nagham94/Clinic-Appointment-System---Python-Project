{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/appointments.css' %}">
{% endblock %}

{% block content %}
<main class="flex-center">
    <div class="auth-container glass-panel">

        <header class="form-header">
            <h1 class="auth-title">Book Appointment</h1>
            <p class="auth-subtitle">Schedule your session with our specialists.</p>
        </header>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="doctor">Select Specialist</label>
                <select name="doctor" id="doctor" required>
                    {% for doctor in doctors %}
                    <option value="{{ doctor.id }}">Dr. {{ doctor.get_full_name }} </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label for="start_datetime">Start Time</label>
                    <input type="datetime-local" name="start_datetime" id="start_datetime" required>
                </div>

                <div class="form-group">
                    <label for="end_datetime">End Time</label>
                    <input type="datetime-local" name="end_datetime" id="end_datetime" required>
                </div>
            </div>

            <div class="form-group">
                <label for="reason">Reason for Visit (optional)</label>
                <textarea name="reason" id="reason" rows="3" placeholder="What should the doctor know?"></textarea>
            </div>

            <button type="submit" class="confirm-btn-enhanced">
                Confirm Booking
            </button>
        </form>
    </div>

    <script>
        function getNowString() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            return now.toISOString().slice(0, 16);
        }

        function isValidTime(datetimeStr) {
            const hour = new Date(datetimeStr).getHours();
            return hour >= 13 && hour < 23;
        }

        //DOM
        const startInput = document.getElementById('start_datetime');
        const endInput = document.getElementById('end_datetime');

        // --- Set Minimums ---
        // --- Set Minimums ---
        const now = getNowString();
        startInput.min = now;
        endInput.min = now;
        startInput.value = ''; // clear any stale value

        // --- Sync end min with start ---
        startInput.addEventListener('change', () => {
            endInput.min = startInput.value;
        });

        // --- Prevent past date selection ---
        startInput.addEventListener('change', () => {
            if (startInput.value < now) {
                startInput.value = now;
                alert('You cannot select a past date.');
            }
            endInput.min = startInput.value;
        });

        endInput.addEventListener('change', () => {
            if (endInput.value < now) {
                endInput.value = now;
                alert('You cannot select a past date.');
            }
        });

        // --- Form Validation ---
        document.querySelector('form').addEventListener('submit', function (e) {
            const start = startInput.value;
            const end = endInput.value;

            if (!start || !end) {
                e.preventDefault();
                alert('Please select both start and end times.');
                return;
            }

            if (!isValidTime(start) || !isValidTime(end)) {
                e.preventDefault();
                alert('Appointments must be between 1:00 PM and 11:00 PM.');
                return;
            }

            const diffMinutes = (new Date(end) - new Date(start)) / (1000 * 60);

            if (diffMinutes <= 0) {
                e.preventDefault();
                alert('End time must be after start time.');
                return;
            }

            if (diffMinutes > 60) {
                e.preventDefault();
                alert('Appointment duration cannot exceed 1 hour.');
                return;
            }

        });
    </script>
</main>
{% endblock %}
