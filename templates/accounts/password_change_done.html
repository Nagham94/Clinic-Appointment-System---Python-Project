{% extends 'base.html' %}
{% block title %}Password Updated - ClinicLife{% endblock %}

{% block content %}
<div class="auth-container"
    style="max-width: 500px; margin: 4rem auto; padding: 3rem; background: white; border-radius: 1.5rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); text-align: center;">
    <div
        style="background: #dcfce7; color: #15803d; width: 64px; height: 64px; border-radius: 1rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
        <i class="fas fa-check-circle" style="font-size: 2rem;"></i>
    </div>

    <h2 style="font-size: 1.875rem; font-weight: 800; color: #1e293b; margin-bottom: 1rem;">Password Updated!</h2>
    <p style="color: #64748b; margin-bottom: 2rem; line-height: 1.6;">Your password has been changed successfully. You
        can now continue using the system with your new credentials.</p>

    <a href="{% url 'dashboard_redirect' %}" class="btn-primary"
        style="display: inline-block; padding: 0.875rem 2rem; font-weight: 600; text-decoration: none;">
        Go to Dashboard
    </a>
</div>
{% endblock %}
